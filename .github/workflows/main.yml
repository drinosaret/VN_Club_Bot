name: Deploy Hikaru

on:
  push:
    branches:
      - master
  workflow_dispatch:

# Least privilege: these jobs only read the repo; no GITHUB_TOKEN writes.
permissions:
  contents: read

jobs:
  # Pre-deploy gate: build the image and audit Python deps BEFORE the deploy
  # job stops the running bot, so a broken build or a vulnerable dependency
  # blocks the deploy instead of taking hikaru offline. deploy needs this.
  verify:
    name: Verify (build + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build image
        run: docker build .
      - name: Audit Python dependencies
        run: |
          python3 -m venv /tmp/audit
          /tmp/audit/bin/pip install --quiet --upgrade pip pip-audit
          /tmp/audit/bin/pip-audit -r requirements.txt

  # Hard gate: deploy only if CodeQL has finished and opened no critical/high
  # alert. Waits for the CodeQL "Analyze" checks to pass, then verifies the open
  # alert count. Fail-closed: a check that never reports, or an API error, also
  # blocks. Update REQUIRED if CodeQL's languages change (it posts one
  # "Analyze (<lang>)" check per language).
  required-checks:
    name: Require CodeQL green
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      security-events: read
    steps:
      - name: Wait for CodeQL to pass, then verify no open critical/high alerts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REQUIRED=(
            "Analyze (actions)"
            "Analyze (python)"
          )
          deadline=$(( $(date +%s) + 1800 ))   # wait up to 30 minutes
          runs_api="repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs?per_page=100"
          while :; do
            runs="$(gh api --paginate "$runs_api" --jq '.check_runs[] | [.name, .status, (.conclusion // "")] | @tsv' 2>/dev/null || true)"
            pending=""; failed=""
            for name in "${REQUIRED[@]}"; do
              line="$(printf '%s\n' "$runs" | awk -F'\t' -v n="$name" '$1==n{print; exit}')"
              if [ -z "$line" ]; then pending+="  - ${name} (not reported yet)"$'\n'; continue; fi
              status="$(printf '%s' "$line" | cut -f2)"
              conclusion="$(printf '%s' "$line" | cut -f3)"
              if [ "$status" != "completed" ]; then pending+="  - ${name} (${status})"$'\n'; continue; fi
              case "$conclusion" in
                success|neutral|skipped) ;;
                *) failed+="  - ${name} (${conclusion})"$'\n' ;;
              esac
            done
            if [ -n "$failed" ]; then
              printf 'Deploy blocked - these checks did not pass:\n%s' "$failed"; exit 1
            fi
            if [ -z "$pending" ]; then
              echo "All required checks passed."; break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              printf 'Deploy blocked - timed out waiting for:\n%s' "$pending"; exit 1
            fi
            printf 'Waiting on:\n%s' "$pending"; sleep 20
          done

          # CodeQL is green. Final guard: refuse to deploy with any open
          # critical/high CodeQL alert (findings are alerts, not red checks).
          if ! alerts="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&per_page=100" \
            --jq '.[] | select(.rule.security_severity_level=="critical" or .rule.security_severity_level=="high") | .number')"; then
            echo "Deploy blocked - could not read CodeQL alerts (failing closed)."; exit 1
          fi
          count="$(printf '%s\n' "$alerts" | grep -c '[0-9]' || true)"
          if [ "$count" -gt 0 ]; then
            echo "Deploy blocked - ${count} open critical/high CodeQL alert(s). See the Security tab."; exit 1
          fi
          echo "No open critical/high CodeQL alerts. Cleared to deploy."

  deploy:
    name: Deploy Hikaru
    needs: [verify, required-checks]
    runs-on: self-hosted
    # Bot secrets/config scoped to the deploy job only (kept off the
    # GitHub-hosted build/audit runner).
    env:
      TOKEN: ${{ secrets.TOKEN }}
      COMMAND_PREFIX: ${{ vars.COMMAND_PREFIX }}
      PATH_TO_DB: ${{ vars.PATH_TO_DB }}
      AUTHORIZED_USERS: ${{ vars.AUTHORIZED_USERS }}
      DB_BACKUP_CHANNEL: ${{ vars.DB_BACKUP_CHANNEL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Data Protection
        run: |
          echo "=== STARTING DATA PROTECTION ==="

          BACKUP_DIR=~/backups/hikaru_$(date +%Y%m%d_%H%M%S)
          mkdir -p "$BACKUP_DIR"

          if [ -d ~/bots/hikaru/data ]; then
            cp -r ~/bots/hikaru/data "$BACKUP_DIR/data.backup"
            echo "✓ data folder backed up"
          fi

          if [ -f ~/bots/hikaru/hikaru_bot.log ]; then
            cp ~/bots/hikaru/hikaru_bot.log "$BACKUP_DIR/hikaru_bot.log.backup"
            echo "✓ log file backed up"
          fi

          # Rotate: keep only the 5 most recent deploy-created backups so
          # the backup directory doesn't grow unbounded.
          # Glob: hikaru_[0-9]* matches the deploy's hikaru_YYYYMMDD_*
          # naming exactly, so any manually-named backup (e.g.
          # hikaru_pre_migration) is never touched, and entries under any
          # other prefix are not matched.
          # ls -1dt sorts by mtime newest-first; tail -n +6 skips the
          # first 5 so only the 6th-and-older are deleted.
          # || true: GitHub Actions runs bash with -eo pipefail; if the
          # glob ever yields zero matches, ls exits non-zero and pipefail
          # would crash the step. The trailing || true makes that case a
          # no-op (OLD_BACKUPS stays empty, else-branch runs).
          # xargs -d '\n': split only on newlines so paths with spaces
          # (none in our naming, but defensive) aren't accidentally
          # split-deleted.
          KEEP=5
          OLD_BACKUPS=$(ls -1dt ~/backups/hikaru_[0-9]* 2>/dev/null | tail -n +$((KEEP+1)) || true)
          if [ -n "$OLD_BACKUPS" ]; then
            REMOVED=$(echo "$OLD_BACKUPS" | wc -l)
            echo "$OLD_BACKUPS" | xargs -d '\n' rm -rf
            echo "✓ Rotated: kept $KEEP most recent, removed $REMOVED older"
          else
            echo "✓ Rotation: no backups beyond cap of $KEEP"
          fi

          echo "=== DATA PROTECTION COMPLETE ==="

      - name: Deploy Code
        run: |
          echo "=== DEPLOYING CODE ==="

          mkdir -p ~/bots/hikaru/data

          # Sync new code, preserving data and log
          rsync -av --exclude='data/' --exclude='hikaru_bot.log' --exclude='.env' . ~/bots/hikaru/

          # Write .env from GitHub secrets/vars.
          # Use printf format args (not pre-built "KEY=VALUE" strings) so a
          # value containing a literal newline is written as-is on a single
          # quoted line by printf — it can't spill onto a subsequent line
          # and forge a different KEY=VALUE entry.
          printf 'TOKEN=%s\nCOMMAND_PREFIX=%s\nPATH_TO_DB=%s\nAUTHORIZED_USERS=%s\nDB_BACKUP_CHANNEL=%s\n' \
            "${TOKEN}" \
            "${COMMAND_PREFIX}" \
            "${PATH_TO_DB}" \
            "${AUTHORIZED_USERS}" \
            "${DB_BACKUP_CHANNEL}" \
            > ~/bots/hikaru/.env

          # Ensure log file exists
          touch ~/bots/hikaru/hikaru_bot.log

          # Verify data directory exists
          if [ ! -d ~/bots/hikaru/data ]; then
            echo "❌ CRITICAL: data folder missing!"
            exit 1
          fi
          echo "✓ data folder preserved"

          echo "=== DEPLOYMENT COMPLETE ==="

      - name: Rebuild and Restart
        run: |
          cd ~/bots/hikaru

          docker compose down || true
          docker compose build
          docker compose up -d

          # Verify container is running. Match both "Up" (compose v1)
          # and "running" (compose v2) so the check works on either
          # runner version without false-negatives.
          sleep 5
          if docker compose ps | grep -qE "Up|running"; then
            echo "✓ Hikaru is running"
          else
            echo "❌ Hikaru failed to start! Checking logs..."
            docker compose logs --tail=50
            exit 1
          fi

          echo "=== DEPLOYMENT COMPLETE ==="

      - name: Clean up unused Docker images
        run: |
          docker image prune -f
